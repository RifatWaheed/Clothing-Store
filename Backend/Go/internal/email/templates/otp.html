<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your verification code</title>
</head>
<body style="margin:0;padding:0;background-color:#f8f6f3;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="padding:48px 16px;">
    <tr>
      <td align="center">
        <table width="100%" cellpadding="0" cellspacing="0" style="max-width:480px;">

          <!-- Header -->
          <tr>
            <td style="padding-bottom:24px;" align="center">
              <table cellpadding="0" cellspacing="0">
                <tr>
                  <td>
                    <div style="width:44px;height:44px;border-radius:16px;background:linear-gradient(135deg,#1f3d2b 0%,#2a5a3f 100%);"></div>
                  </td>
                  <td style="padding-left:12px;">
                    <span style="font-size:20px;font-weight:700;color:#121212;letter-spacing:-0.02em;">YourBrand</span>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Card -->
          <tr>
            <td style="background:#ffffff;border-radius:22px;border:1px solid rgba(18,18,18,0.10);padding:36px 32px;box-shadow:0 8px 32px rgba(0,0,0,0.08);">

              <p style="margin:0 0 8px;font-size:13px;color:rgba(18,18,18,0.55);letter-spacing:0.3px;text-transform:uppercase;">Verification code</p>
              <h1 style="margin:0 0 24px;font-size:26px;font-weight:700;color:#121212;letter-spacing:-0.02em;">Confirm your email</h1>

              <p style="margin:0 0 20px;font-size:15px;color:rgba(18,18,18,0.70);line-height:1.6;">
                Enter this code to complete your sign-in. It expires in <strong>10 minutes</strong>.
              </p>

              <!-- OTP box -->
              <div style="background:#f8f6f3;border-radius:14px;border:1px solid rgba(18,18,18,0.08);padding:20px;text-align:center;margin-bottom:24px;">
                <span style="font-size:38px;font-weight:700;letter-spacing:12px;color:#1f3d2b;font-variant-numeric:tabular-nums;">{{.OTP}}</span>
              </div>

              <p style="margin:0 0 8px;font-size:13px;color:rgba(18,18,18,0.50);line-height:1.5;">
                This code was requested for <strong style="color:#121212;">{{.Email}}</strong>. If you did not request this, you can safely ignore this email.
              </p>

            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="padding-top:24px;" align="center">
              <p style="margin:0;font-size:12px;color:rgba(18,18,18,0.40);">
                &copy; YourBrand &mdash; sent from rifatwaheed.com
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
